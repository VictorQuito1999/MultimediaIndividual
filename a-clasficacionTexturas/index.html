<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Clasificación de Superficies - Visión Artificial</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <style>
        body {
            background-color: transparent;
            min-height: auto;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="tk-window-mockup" style="margin: 0; width: 100%; height: 100vh; max-width: none; border: none; box-shadow: none; border-radius: 0;">
        <div class="tk-titlebar">
            <div class="tk-titlebar-text">Sistema de Clasificación de Superficies - Visión Artificial</div>
            <div class="tk-titlebar-buttons">
                <span class="tk-title-btn tk-title-btn-min"></span>
                <span class="tk-title-btn tk-title-btn-max"></span>
                <span class="tk-title-btn tk-title-btn-close"></span>
            </div>
        </div>
        <div class="tk-content">
            <fieldset class="tk-labelframe">
                <legend class="tk-legend"> Panel de Control y Configuración </legend>
                <div class="tk-labelframe-content">
                    <button class="tk-button" id="btn-cargar" style="background: #4CAF50; color: white; font-weight: bold;">📁 Cargar Imagen</button>
                    <input type="file" id="file-input" accept="image/*" style="display: none;">
                    
                    <div class="tk-separator tk-separator-vertical"></div>
                    
                    <select class="tk-combobox" id="combo-superficie" style="margin-left: 5px;">
                        <option value="Césped">Césped (Verde)</option>
                        <option value="Tierra">Tierra (Marrón)</option>
                        <option value="Asfalto">Asfalto/Cemento (Gris)</option>
                    </select>
                    
                    <button class="tk-button" id="btn-filtrar" style="background: #2196F3; color: white; font-weight: normal; margin-left: 5px;">🔍 Filtrar Selección</button>

                    <div class="tk-separator tk-separator-vertical"></div>
                    
                    <button class="tk-button" id="btn-total" style="background: #9C27B0; color: white; font-weight: bold;">📊 Clasificación Total (Mapa)</button>
                </div>
            </fieldset>

            <div class="tk-frame">
                <fieldset class="tk-labelframe" style="flex: 1;">
                    <legend class="tk-legend"> ANTES (Imagen Original) </legend>
                    <div class="tk-image-container" id="lbl-antes">Ninguna imagen cargada</div>
                </fieldset>

                <fieldset class="tk-labelframe" style="flex: 1;">
                    <legend class="tk-legend"> DESPUÉS (Resultado del Análisis) </legend>
                    <div class="tk-image-container" id="lbl-despues">Esperando procesamiento...</div>
                </fieldset>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnCargar = document.getElementById('btn-cargar');
            const fileInput = document.getElementById('file-input');
            const btnTotal = document.getElementById('btn-total');
            const lblAntes = document.getElementById('lbl-antes');
            const lblDespues = document.getElementById('lbl-despues');

            let originalImage = null;

            btnCargar.addEventListener('click', () => {
                fileInput.click();
            });

            fileInput.addEventListener('change', (e) => {
                if (e.target.files && e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const img = new Image();
                        img.onload = function() {
                            originalImage = img;
                            lblAntes.innerHTML = '';
                            const displayImg = document.createElement('img');
                            displayImg.src = img.src;
                            displayImg.className = 'tk-label-img';
                            lblAntes.appendChild(displayImg);
                            
                            lblDespues.innerHTML = 'Esperando procesamiento...';
                        }
                        img.src = event.target.result;
                    }
                    reader.readAsDataURL(e.target.files[0]);
                }
            });

            // Helper: RGB to HSV matching OpenCV ranges (H: 0-179, S: 0-255, V: 0-255)
            function rgbToHsv(r, g, b) {
                let rNorm = r / 255;
                let gNorm = g / 255;
                let bNorm = b / 255;
                let max = Math.max(rNorm, gNorm, bNorm);
                let min = Math.min(rNorm, gNorm, bNorm);
                let d = max - min;
                let h = 0;
                let s = max === 0 ? 0 : d / max;
                let v = max;

                if (max !== min) {
                    switch (max) {
                        case rNorm: h = (gNorm - bNorm) / d + (gNorm < bNorm ? 6 : 0); break;
                        case gNorm: h = (bNorm - rNorm) / d + 2; break;
                        case bNorm: h = (rNorm - gNorm) / d + 4; break;
                    }
                    h /= 6;
                }
                
                return {
                    h: Math.round(h * 179), // OpenCV H is 0-179
                    s: Math.round(s * 255),
                    v: Math.round(v * 255)
                };
            }

            function inRange(h, s, v, hMin, hMax, sMin, sMax, vMin, vMax) {
                return h >= hMin && h <= hMax && s >= sMin && s <= sMax && v >= vMin && v <= vMax;
            }

            const btnFiltrar = document.getElementById('btn-filtrar');
            const comboSuperficie = document.getElementById('combo-superficie');

            btnFiltrar.addEventListener('click', () => {
                if (!originalImage) return;

                const canvas = document.createElement('canvas');
                canvas.width = originalImage.width;
                canvas.height = originalImage.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(originalImage, 0, 0);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                const seleccion = comboSuperficie.value;

                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i];
                    let g = data[i + 1];
                    let b = data[i + 2];
                    
                    const { h, s, v } = rgbToHsv(r, g, b);
                    let keep = false;

                    if (seleccion === "Césped" && inRange(h, s, v, 35, 85, 40, 255, 40, 255)) {
                        keep = true;
                    } else if (seleccion === "Tierra" && inRange(h, s, v, 10, 25, 40, 255, 30, 255)) {
                        keep = true;
                    } else if (seleccion === "Asfalto" && inRange(h, s, v, 0, 180, 0, 50, 40, 200)) {
                        keep = true;
                    }

                    if (!keep) {
                        data[i] = 0;
                        data[i+1] = 0;
                        data[i+2] = 0;
                    }
                }

                ctx.putImageData(imageData, 0, 0);
                lblDespues.innerHTML = '';
                const displayImg = document.createElement('img');
                displayImg.src = canvas.toDataURL();
                displayImg.className = 'tk-label-img';
                lblDespues.appendChild(displayImg);
            });

            btnTotal.addEventListener('click', () => {
                if (!originalImage) return;

                // Draw original to canvas to get pixel data
                const canvas = document.createElement('canvas');
                canvas.width = originalImage.width;
                canvas.height = originalImage.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(originalImage, 0, 0);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;

                // Process pixels
                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i];
                    let g = data[i + 1];
                    let b = data[i + 2];
                    
                    const { h, s, v } = rgbToHsv(r, g, b);

                    let mappedR = r;
                    let mappedG = g;
                    let mappedB = b;
                    let found = false;

                    // 1. Cesped: H: 35-85, S: 40-255, V: 40-255 (BGR: 0, 255, 0 -> RGB: 0, 255, 0)
                    if (inRange(h, s, v, 35, 85, 40, 255, 40, 255)) {
                        mappedR = 0; mappedG = 255; mappedB = 0; found = true;
                    }
                    // 2. Tierra: H: 10-25, S: 40-255, V: 30-255 (BGR: 0, 128, 255 -> RGB: 255, 128, 0)
                    else if (inRange(h, s, v, 10, 25, 40, 255, 30, 255)) {
                        mappedR = 255; mappedG = 128; mappedB = 0; found = true;
                    }
                    // 3. Asfalto: H: 0-180, S: 0-50, V: 40-200 (BGR: 255, 0, 0 -> RGB: 0, 0, 255)
                    else if (inRange(h, s, v, 0, 180, 0, 50, 40, 200)) {
                        mappedR = 0; mappedG = 0; mappedB = 255; found = true;
                    }

                    if (found) {
                        // Blend 50% original 50% map
                        data[i] = Math.round(r * 0.5 + mappedR * 0.5);
                        data[i+1] = Math.round(g * 0.5 + mappedG * 0.5);
                        data[i+2] = Math.round(b * 0.5 + mappedB * 0.5);
                    }
                }

                ctx.putImageData(imageData, 0, 0);

                lblDespues.innerHTML = '';
                const displayImg = document.createElement('img');
                displayImg.src = canvas.toDataURL();
                displayImg.className = 'tk-label-img';
                lblDespues.appendChild(displayImg);
            });
        });
    </script>
</body>
</html>
