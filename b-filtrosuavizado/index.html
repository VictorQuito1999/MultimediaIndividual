<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtro de Suavizado </title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <style>
        body {
            background-color: transparent;
            min-height: auto;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .tk-controls-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tk-label-inline {
            font-size: 13px;
            color: #333;
            white-space: nowrap;
        }
        .tk-select {
            font-size: 13px;
            padding: 4px 8px;
            border: 1px solid #aaa;
            border-radius: 4px;
            background: white;
            min-width: 280px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="tk-window-mockup" style="margin: 0; width: 100%; height: 100vh; max-width: none; border: none; box-shadow: none; border-radius: 0;">
        <div class="tk-titlebar">
            <div class="tk-titlebar-text">Filtro de Suavizado y Detección de Bordes (Matricial)</div>
            <div class="tk-titlebar-buttons">
                <span class="tk-title-btn tk-title-btn-min"></span>
                <span class="tk-title-btn tk-title-btn-max"></span>
                <span class="tk-title-btn tk-title-btn-close"></span>
            </div>
        </div>
        <div class="tk-content">
            <!-- Panel Superior: Control de Procesamiento -->
            <fieldset class="tk-labelframe">
                <legend class="tk-legend"> Control de Procesamiento </legend>
                <div class="tk-labelframe-content tk-controls-row">
                    <button class="tk-button" id="btn-cargar" style="background: #4CAF50; color: white; font-weight: bold;">📁 Cargar Imagen</button>
                    <input type="file" id="file-input" accept="image/*" style="display: none;">
                    
                    <div class="tk-separator tk-separator-vertical"></div>
                    
                    <span class="tk-label-inline">Operación:</span>
                    <select class="tk-select" id="combo-operacion">
                        <option value="solo">Solo Suavizado (Gaussiano 3x3)</option>
                        <option value="bordes" selected>Suavizado + Detección de Bordes (Sobel 3x3)</option>
                    </select>
                    
                    <button class="tk-button" id="btn-filtrar" style="background: #009688; color: white; font-weight: bold;">✨ Aplicar Algoritmo</button>
                </div>
            </fieldset>

            <!-- Panel Inferior: Imágenes -->
            <div class="tk-frame">
                <fieldset class="tk-labelframe" style="flex: 1;">
                    <legend class="tk-legend"> ANTES (Original) </legend>
                    <div class="tk-image-container" id="lbl-antes">Ninguna imagen cargada</div>
                </fieldset>

                <fieldset class="tk-labelframe" style="flex: 1;">
                    <legend class="tk-legend"> DESPUÉS (Procesada) </legend>
                    <div class="tk-image-container" id="lbl-despues">Esperando procesamiento...</div>
                </fieldset>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnCargar   = document.getElementById('btn-cargar');
            const fileInput   = document.getElementById('file-input');
            const btnFiltrar  = document.getElementById('btn-filtrar');
            const comboOp     = document.getElementById('combo-operacion');
            const lblAntes    = document.getElementById('lbl-antes');
            const lblDespues  = document.getElementById('lbl-despues');

            let originalImage = null;

            // --- Cargar Imagen ---
            btnCargar.addEventListener('click', () => {
                fileInput.click();
            });

            fileInput.addEventListener('change', (e) => {
                if (e.target.files && e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const img = new Image();
                        img.onload = function() {
                            // Redimensionar a 420x420 al igual que hace Python con cv2.resize
                            const canvas = document.createElement('canvas');
                            canvas.width = 420;
                            canvas.height = 420;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, 420, 420);
                            
                            const resized = new Image();
                            resized.onload = function() {
                                originalImage = resized;
                                lblAntes.innerHTML = '';
                                const displayImg = document.createElement('img');
                                displayImg.src = resized.src;
                                displayImg.className = 'tk-label-img';
                                lblAntes.appendChild(displayImg);
                                
                                lblDespues.innerHTML = 'Esperando procesamiento...';
                            };
                            resized.src = canvas.toDataURL();
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(e.target.files[0]);
                }
            });

            // --- Kernels explícitos ---
            const kernelGauss = [
                1/16, 2/16, 1/16,
                2/16, 4/16, 2/16,
                1/16, 2/16, 1/16
            ];

            const kernelSobelX = [
                -1, 0, 1,
                -2, 0, 2,
                -1, 0, 1
            ];

            const kernelSobelY = [
                -1, -2, -1,
                 0,  0,  0,
                 1,  2,  1
            ];

            // --- Convolución explícita de 3x3 ---
            // Deja las fronteras exteriores (1px) en 0 como hace Python
            function convolucion3x3(srcChannel, kernel, w, h) {
                const dstChannel = new Float32Array(w * h); // inicializado a 0
                for (let y = 1; y < h - 1; y++) {
                    for (let x = 1; x < w - 1; x++) {
                        let val = 0;
                        for (let ky = 0; ky < 3; ky++) {
                            for (let kx = 0; kx < 3; kx++) {
                                const py = y - 1 + ky;
                                const px = x - 1 + kx;
                                val += srcChannel[py * w + px] * kernel[ky * 3 + kx];
                            }
                        }
                        dstChannel[y * w + x] = val;
                    }
                }
                return dstChannel;
            }

            // --- Procesamiento de imagen ---
            btnFiltrar.addEventListener('click', () => {
                if (!originalImage) return;

                const seleccion = comboOp.value;

                // Crear canvas temporal para leer los píxeles
                const canvas = document.createElement('canvas');
                canvas.width = originalImage.width;
                canvas.height = originalImage.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(originalImage, 0, 0);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                const w = canvas.width;
                const h = canvas.height;

                // Extraer canales de color individuales
                const rChan = new Float32Array(w * h);
                const gChan = new Float32Array(w * h);
                const bChan = new Float32Array(w * h);

                for (let i = 0; i < w * h; i++) {
                    rChan[i] = data[i * 4];
                    gChan[i] = data[i * 4 + 1];
                    bChan[i] = data[i * 4 + 2];
                }

                // PASO 1: Suavizado Gaussiano Matricial
                const rSmooth = convolucion3x3(rChan, kernelGauss, w, h);
                const gSmooth = convolucion3x3(gChan, kernelGauss, w, h);
                const bSmooth = convolucion3x3(bChan, kernelGauss, w, h);

                // Preparar imagen final
                const finalImageData = ctx.createImageData(w, h);
                const outData = finalImageData.data;

                // PASO 2: Selección de Algoritmo
                if (seleccion === 'bordes') {
                    // Conversión manual a escala de grises usando pesos de luminancia OpenCV/estándar:
                    // img_gris = 0.299 * R + 0.587 * G + 0.114 * B
                    const grayChan = new Float32Array(w * h);
                    for (let i = 0; i < w * h; i++) {
                        grayChan[i] = 0.299 * rSmooth[i] + 0.587 * gSmooth[i] + 0.114 * bSmooth[i];
                    }

                    // Aplicar Sobel X e Y
                    const gx = convolucion3x3(grayChan, kernelSobelX, w, h);
                    const gy = convolucion3x3(grayChan, kernelSobelY, w, h);

                    // Calcular magnitud: sqrt(Gx^2 + Gy^2)
                    for (let i = 0; i < w * h; i++) {
                        const mag = Math.sqrt(gx[i] * gx[i] + gy[i] * gy[i]);
                        const val = Math.min(Math.max(mag, 0), 255);
                        
                        outData[i * 4]     = val; // R
                        outData[i * 4 + 1] = val; // G
                        outData[i * 4 + 2] = val; // B
                        outData[i * 4 + 3] = 255; // Alpha
                    }
                } else {
                    // Solo suavizado: mezclar los canales suavizados de nuevo
                    for (let i = 0; i < w * h; i++) {
                        outData[i * 4]     = Math.min(Math.max(rSmooth[i], 0), 255);
                        outData[i * 4 + 1] = Math.min(Math.max(gSmooth[i], 0), 255);
                        outData[i * 4 + 2] = Math.min(Math.max(bSmooth[i], 0), 255);
                        outData[i * 4 + 3] = 255; // Alpha (píxeles de borde tendrán color negro debido a la inicialización a 0)
                    }
                }

                ctx.putImageData(finalImageData, 0, 0);

                // Mostrar el resultado procesado
                lblDespues.innerHTML = '';
                const displayImg = document.createElement('img');
                displayImg.src = canvas.toDataURL();
                displayImg.className = 'tk-label-img';
                lblDespues.appendChild(displayImg);
            });
        });
    </script>
</body>
</html>
