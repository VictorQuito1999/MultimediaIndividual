<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtro de Suavizado (Gaussiano 3x3)</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <style>
        body {
            background-color: transparent;
            min-height: auto;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="tk-window-mockup" style="margin: 0; width: 100%; height: 100vh; max-width: none; border: none; box-shadow: none; border-radius: 0;">
        <div class="tk-titlebar">
            <div class="tk-titlebar-text">Filtro de Suavizado (Gaussiano 3x3)</div>
            <div class="tk-titlebar-buttons">
                <span class="tk-title-btn tk-title-btn-min"></span>
                <span class="tk-title-btn tk-title-btn-max"></span>
                <span class="tk-title-btn tk-title-btn-close"></span>
            </div>
        </div>
        <div class="tk-content">
            <fieldset class="tk-labelframe">
                <legend class="tk-legend"> Control de Suavizado </legend>
                <div class="tk-labelframe-content">
                    <button class="tk-button" id="btn-cargar" style="background: #4CAF50; color: white; font-weight: bold;">📁 Cargar Imagen</button>
                    <input type="file" id="file-input" accept="image/*" style="display: none;">
                    
                    <div class="tk-separator tk-separator-vertical"></div>
                    
                    <button class="tk-button" id="btn-filtrar" style="background: #009688; color: white; font-weight: bold;">✨ Aplicar Filtro Gaussiano (3x3)</button>
                </div>
            </fieldset>

            <div class="tk-frame">
                <fieldset class="tk-labelframe" style="flex: 1;">
                    <legend class="tk-legend"> ANTES (Original con Ruido) </legend>
                    <div class="tk-image-container" id="lbl-antes">Ninguna imagen cargada</div>
                </fieldset>

                <fieldset class="tk-labelframe" style="flex: 1;">
                    <legend class="tk-legend"> DESPUÉS (Suavizado Gaussiano) </legend>
                    <div class="tk-image-container" id="lbl-despues">Esperando procesamiento...</div>
                </fieldset>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnCargar = document.getElementById('btn-cargar');
            const fileInput = document.getElementById('file-input');
            const btnFiltrar = document.getElementById('btn-filtrar');
            const lblAntes = document.getElementById('lbl-antes');
            const lblDespues = document.getElementById('lbl-despues');

            let originalImage = null;

            btnCargar.addEventListener('click', () => {
                fileInput.click();
            });

            fileInput.addEventListener('change', (e) => {
                if (e.target.files && e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const img = new Image();
                        img.onload = function() {
                            originalImage = img;
                            lblAntes.innerHTML = '';
                            const displayImg = document.createElement('img');
                            displayImg.src = img.src;
                            displayImg.className = 'tk-label-img';
                            lblAntes.appendChild(displayImg);
                            
                            lblDespues.innerHTML = 'Esperando procesamiento...';
                        }
                        img.src = event.target.result;
                    }
                    reader.readAsDataURL(e.target.files[0]);
                }
            });

            btnFiltrar.addEventListener('click', () => {
                if (!originalImage) return;

                const canvas = document.createElement('canvas');
                canvas.width = originalImage.width;
                canvas.height = originalImage.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(originalImage, 0, 0);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                
                const outputImageData = ctx.createImageData(canvas.width, canvas.height);
                const outData = outputImageData.data;

                const width = canvas.width;
                const height = canvas.height;

                // 3x3 Gaussian Kernel
                const kernel = [
                    1, 2, 1,
                    2, 4, 2,
                    1, 2, 1
                ];
                const kernelWeight = 16;

                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        let index = (y * width + x) * 4;
                        
                        // Keep alpha original
                        outData[index + 3] = data[index + 3];

                        let r = 0, g = 0, b = 0;

                        // Apply kernel
                        for (let ky = -1; ky <= 1; ky++) {
                            for (let kx = -1; kx <= 1; kx++) {
                                let nx = x + kx;
                                let ny = y + ky;

                                // Edge handling (extend)
                                if (nx < 0) nx = 0;
                                if (nx >= width) nx = width - 1;
                                if (ny < 0) ny = 0;
                                if (ny >= height) ny = height - 1;

                                let nIndex = (ny * width + nx) * 4;
                                let kValue = kernel[(ky + 1) * 3 + (kx + 1)];

                                r += data[nIndex] * kValue;
                                g += data[nIndex + 1] * kValue;
                                b += data[nIndex + 2] * kValue;
                            }
                        }

                        outData[index] = r / kernelWeight;
                        outData[index + 1] = g / kernelWeight;
                        outData[index + 2] = b / kernelWeight;
                    }
                }

                ctx.putImageData(outputImageData, 0, 0);

                lblDespues.innerHTML = '';
                const displayImg = document.createElement('img');
                displayImg.src = canvas.toDataURL();
                displayImg.className = 'tk-label-img';
                lblDespues.appendChild(displayImg);
            });
        });
    </script>
</body>
</html>
